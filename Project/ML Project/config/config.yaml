# ============================================================
# Multimodal Fake Product Hype Detection
# config/config.yaml — Central Configuration File
# ============================================================

project:
  name: "Multimodal Fake Product Hype Detection"
  version: "1.0.0"
  author: "Research Team"
  seed: 42

paths:
  raw_data:        "data/raw/"
  processed_data:  "data/processed/"
  features:        "data/features/"
  models:          "models/saved/"
  reports:         "reports/"
  figures:         "reports/figures/"
  logs:            "logs/"
  paper:           "paper/"

data:
  amazon_file:     "data/raw/amazon_reviews.csv"
  yelp_file:       "data/raw/yelp_reviews.json"
  min_reviews:     5          # minimum reviews per product to include
  max_text_len:    512        # max token length for BERT
  test_size:       0.2
  val_size:        0.1
  stratify:        true

preprocessing:
  remove_stopwords:  true
  lemmatize:         true
  min_word_length:   2
  max_vocab_size:    50000
  language:          "english"

features:
  tfidf:
    max_features:    10000
    ngram_range:     [1, 2]
    min_df:          2
  bert:
    model_name:      "sentence-transformers/all-MiniLM-L6-v2"
    batch_size:      32
    embedding_dim:   384
  sentiment:
    use_vader:       true
    use_textblob:    true
  temporal:
    burst_window_days:   7
    min_burst_reviews:   3
  reviewer:
    min_reviewer_reviews: 2

models:
  fake_review_classifier:
    tfidf_lr:
      C: 1.0
      max_iter: 1000
      solver: "lbfgs"
    random_forest:
      n_estimators: 200
      max_depth: 10
      min_samples_split: 5
  temporal_anomaly:
    isolation_forest:
      contamination: 0.1
      n_estimators: 100
      random_state: 42
  reviewer_behavior:
    xgboost:
      n_estimators: 200
      learning_rate: 0.05
      max_depth: 6
      subsample: 0.8
  fusion:
    method: "gradient_boosting"
    gradient_boosting:
      n_estimators: 100
      learning_rate: 0.1
      max_depth: 4

hype_score:
  weights:
    fake_review_prob:     0.35
    temporal_anomaly:     0.30
    reviewer_behavior:    0.20
    rating_variance:      0.15
  thresholds:
    low:     33
    medium:  66
    high:    100

evaluation:
  metrics: ["precision", "recall", "f1", "roc_auc", "accuracy"]
  cv_folds: 5

logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {message}"
